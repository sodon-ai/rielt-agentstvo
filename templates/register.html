
{% extends "base.html" %}
{% block content %}
<section style="padding: 50px 0;">
    <div class="container">
        <div style="max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px;">
            <h2 style="color: #1a5d7a;">Регистрация</h2>
            {% if error %}
            <p style="color: red;">{{ error }}</p>
            {% endif %}
            <form method="post">
                <div class="form-group">
                    <label>Имя</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" name="username" required>
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" name="password" required>
                </div>
                <div class="form-group">
                    <label>Роль</label>
                    <select name="role">
                        <option value="client">Клиент (просмотр квартир)</option>
                        <option value="seller">Продавец (добавление объявлений)</option>
                    </select>
                </div>
                <button type="submit" class="btn">Зарегистрироваться</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
